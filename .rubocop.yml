AllCops:
  NewCops: enable
  TargetRubyVersion: 3.1
  Exclude:
    - "_site/**/*"
    - "_site_next_test/**/*"
    - "vendor/**/*"

Layout/LineLength:
  Max: 140

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/StringLiterals:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Naming/FileName:
  Enabled: false

Style/IfUnlessModifier:
  Enabled: false
