name: Release

on:
  workflow_call:

permissions:
  contents: write

concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Build + Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Check if version needs publishing
        id: check_version
        shell: bash
        run: |
          set -euo pipefail
          VERSION_FILE="./lib/jekyll/vitepress_theme/version.rb"
          VERSION=$(ruby -r "$VERSION_FILE" -e "puts Jekyll::VitePressTheme::VERSION" 2>/dev/null)

          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract VERSION from $VERSION_FILE" >&2
            exit 1
          fi
          echo "Local version: $VERSION"

          GEM_NAME="jekyll-vitepress-theme"
          echo "Fetching published versions for '$GEM_NAME'..."

          ALL_PUBLISHED_VERSIONS=$( \
            ( \
              gem list ^${GEM_NAME}$ -r --all 2>/dev/null || true
              gem list ^${GEM_NAME}$ -r --prerelease 2>/dev/null || true
            ) | sed -n 's/.*(\(.*\)).*/\1/p' \
              | tr ',' '\n' \
              | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
              | sed '/^$/d' \
              | sort -u \
          )

          if echo "$ALL_PUBLISHED_VERSIONS" | grep -Fxq "$VERSION"; then
            echo "Verdict: Version $VERSION already published."
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Verdict: Version $VERSION is new."
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Pages metadata
        if: steps.check_version.outputs.version_changed == 'true'
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"

          if [[ "${REPO}" == "${OWNER}.github.io" ]]; then
            BASE_PATH=""
          else
            BASE_PATH="/${REPO}"
          fi

          echo "base_path=${BASE_PATH}" >> "$GITHUB_OUTPUT"

      - name: Load existing versions manifest from gh-pages
        if: steps.check_version.outputs.version_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --no-tags origin gh-pages
            git show origin/gh-pages:versions.yml > .tmp/versions-in.yml || true
          fi

      - name: Generate versions.yml
        if: steps.check_version.outputs.version_changed == 'true'
        run: |
          ruby scripts/version_manifest.rb \
            --mode release \
            --version "${{ steps.check_version.outputs.version }}" \
            --base-path "${{ steps.meta.outputs.base_path }}" \
            --manifest-in .tmp/versions-in.yml \
            --manifest-out _data/versions.yml \
            --repository "${{ github.repository }}"

      - name: Build versioned docs
        if: steps.check_version.outputs.version_changed == 'true'
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.meta.outputs.base_path }}/v/${{ steps.check_version.outputs.version }}" \
            --destination _site_release
        env:
          JEKYLL_ENV: production

      - name: Build latest docs
        if: steps.check_version.outputs.version_changed == 'true'
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.meta.outputs.base_path }}/latest" \
            --destination _site_latest
        env:
          JEKYLL_ENV: production

      - name: Publish version + latest docs to gh-pages
        if: steps.check_version.outputs.version_changed == 'true'
        env:
          RELEASE_VERSION: ${{ steps.check_version.outputs.version }}
          SITE_RELEASE_DIR: _site_release
          SITE_LATEST_DIR: _site_latest
          VERSIONS_FILE: _data/versions.yml
        run: |
          export COMMIT_MESSAGE="docs: publish v${RELEASE_VERSION} + latest"
          bash scripts/publish_gh_pages.sh release

      - name: Build gem package
        if: steps.check_version.outputs.version_changed == 'true'
        run: gem build jekyll-vitepress-theme.gemspec

      - name: Publish gem to RubyGems
        if: steps.check_version.outputs.version_changed == 'true'
        env:
          GEM_HOST_API_KEY: "${{ secrets.RUBYGEMS_AUTH_TOKEN }}"
          GEM_VERSION: "${{ steps.check_version.outputs.version }}"
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GEM_HOST_API_KEY}" ]]; then
            echo "RUBYGEMS_AUTH_TOKEN is not configured."
            exit 1
          fi

          mkdir -p "$HOME/.gem"
          cat > "$HOME/.gem/credentials" <<EOF
          ---
          :rubygems_api_key: ${GEM_HOST_API_KEY}
          EOF
          chmod 0600 "$HOME/.gem/credentials"

          gem_file="jekyll-vitepress-theme-${GEM_VERSION}.gem"
          output=$(gem push "${gem_file}" 2>&1) || {
            echo "$output"
            if echo "$output" | grep -q "Repushing of gem versions is not allowed"; then
              echo "Version already exists, skipping"
              exit 0
            else
              exit 1
            fi
          }
          echo "$output"
