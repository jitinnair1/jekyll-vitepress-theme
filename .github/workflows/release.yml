name: Release

on:
  workflow_call:

permissions:
  contents: write

concurrency:
  group: gem-release
  cancel-in-progress: false

jobs:
  publish:
    name: Build + Publish Gem
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Check if version needs publishing
        id: check_version
        shell: bash
        run: |
          set -euo pipefail
          VERSION_FILE="./lib/jekyll/vitepress_theme/version.rb"
          VERSION=$(ruby -r "$VERSION_FILE" -e "puts Jekyll::VitePressTheme::VERSION" 2>/dev/null)

          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract VERSION from $VERSION_FILE" >&2
            exit 1
          fi
          echo "Local version: $VERSION"

          GEM_NAME="jekyll-vitepress-theme"
          echo "Fetching published versions for '$GEM_NAME'..."

          ALL_PUBLISHED_VERSIONS=$( \
            ( \
              gem list ^${GEM_NAME}$ -r --all 2>/dev/null || true
              gem list ^${GEM_NAME}$ -r --prerelease 2>/dev/null || true
            ) | sed -n 's/.*(\(.*\)).*/\1/p' \
              | tr ',' '\n' \
              | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
              | sed '/^$/d' \
              | sort -u \
          )

          if echo "$ALL_PUBLISHED_VERSIONS" | grep -Fxq "$VERSION"; then
            echo "Verdict: Version $VERSION already published."
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Verdict: Version $VERSION is new."
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build gem package
        if: steps.check_version.outputs.version_changed == 'true'
        run: gem build jekyll-vitepress-theme.gemspec

      - name: Publish gem to RubyGems
        if: steps.check_version.outputs.version_changed == 'true'
        env:
          GEM_HOST_API_KEY: "${{ secrets.RUBYGEMS_AUTH_TOKEN }}"
          GEM_VERSION: "${{ steps.check_version.outputs.version }}"
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GEM_HOST_API_KEY}" ]]; then
            echo "RUBYGEMS_AUTH_TOKEN is not configured."
            exit 1
          fi

          mkdir -p "$HOME/.gem"
          cat > "$HOME/.gem/credentials" <<EOF
          ---
          :rubygems_api_key: ${GEM_HOST_API_KEY}
          EOF
          chmod 0600 "$HOME/.gem/credentials"

          gem_file="jekyll-vitepress-theme-${GEM_VERSION}.gem"
          output=$(gem push "${gem_file}" 2>&1) || {
            echo "$output"
            if echo "$output" | grep -q "Repushing of gem versions is not allowed"; then
              echo "Version already exists, skipping"
              exit 0
            else
              exit 1
            fi
          }
          echo "$output"
