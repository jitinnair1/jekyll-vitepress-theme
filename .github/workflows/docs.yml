name: Deploy Docs

on:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/docs.yml'
      - '_**/**'
      - '_config.yml'
      - 'assets/**'
      - 'docs/**'
      - 'lib/**'
      - 'scripts/**'
      - '*.md'
      - 'search.json'
      - 'Gemfile'
      - 'Gemfile.lock'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Pages metadata
        id: pages
        uses: actions/configure-pages@v5

      - name: Build docs
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.pages.outputs.base_path }}" \
            --destination _site
        env:
          JEKYLL_ENV: production

      - name: Publish docs to gh-pages
        env:
          SITE_ROOT_DIR: _site
        run: |
          export COMMIT_MESSAGE="docs: publish site (${GITHUB_SHA::7})"
          bash scripts/publish_gh_pages.sh single
